services:
  mysql:
    image: mysql:8.0
    container_name: freelance_mysql_v2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-freelance_platform}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - freelance_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  freelance_mysql_data:
